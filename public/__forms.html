<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Form Detection</title>
  </head>
  <body>
    <!--
      This hidden static form exists solely so Netlify can detect the
      "bbq-rsvp" form and all of its fields at build time. The real,
      user-facing form is the client-rendered React form, which submits
      to Netlify via AJAX. Keep the field names here in sync with that form.
    -->
    <form name="bbq-rsvp" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="bbq-rsvp" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="attendance" />
      <input type="text" name="guests" />
      <input type="text" name="dietary" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
